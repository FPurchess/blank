language: go
go:
  - 1.5
  - 1.6
path:
  - GOPATH=${TRAVIS_BUILD_DIR}/src:$GOPATH
install: ./scripts/ci/install.sh
script: ./scripts/ci/build.sh
notifications:
  email:
    on_success: never
    on_failure: change
cache:
  directories:
    - node_modules
deploy:
  skip_cleanup: true
  provider: releases
  api_key:
    secure: 
  file:
    - bin/blank-linux-x64-$TRAVIS_BRANCH-0.1.$TRAVIS_BUILD_NUMBER
    - bin/blank-windows-x64-$TRAVIS_BRANCH-0.1.$TRAVIS_BUILD_NUMBER.exe
  on:
    repo: FPurchess/blank
    branch: master
